# Pure-python sdist-only package — `six` 1.4.1 predates the
# widespread wheel ecosystem and never published a wheel artifact.
# v0.6 exercises the new sdist-in-multi-platform path: host install
# with `forbid_native_extensions=True`, single repo serving every
# target platform (no selector, since pure-Python sdists are
# platform-agnostic).
[[package]]
name = "six"
version = "1.4.1"
source = { registry = "https://pypi.org/simple" }
sdist = { url = "https://files.pythonhosted.org/packages/4e/aa/73683ca0c4237891e33562e3f55bcaab972869959b97b397637519d92035/six-1.4.1.tar.gz", hash = "sha256:f045afd6dffb755cc0411acb7ce9acc4de0e71261d4b5f91de2e68d9aa5f8367" }
